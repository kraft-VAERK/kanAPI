events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
    # FastAPI app (runs on host, outside Docker)
    upstream fastapi {
        server host.docker.internal:8000;
    }

    # MinIO S3 API
    upstream minio_api {
        server minio:9000;
    }

    # MinIO web console
    upstream minio_console {
        server minio:9001;
    }

    # OpenFGA API
    upstream openfga_api {
        server openfga:8080;
    }

    server {
        listen 8888;

        # MinIO S3 API — /minio/...
        location /minio/ {
            rewrite ^/minio/(.*) /$1 break;
            proxy_pass http://minio_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MinIO web console — /minio-console/...
        location /minio-console/ {
            rewrite ^/minio-console/(.*) /$1 break;
            proxy_pass http://minio_console;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # WebSocket support (MinIO console uses it)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # OpenFGA API — /fga/...
        location /fga/ {
            rewrite ^/fga/(.*) /$1 break;
            proxy_pass http://openfga_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # FastAPI app — everything else
        location / {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
