server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: kanapi
    static_configs:
      - targets:
          - localhost
        labels:
          job: kanapi
          __path__: /var/log/kanapi/backend.log
    pipeline_stages:
      - json:
          expressions:
            username: username
            method: method
            path: path
            status_code: status_code
            duration_ms: duration_ms
            request_id: request_id
            event: event
      - labels:
          username:
          method:
          path:
          status_code:
          event:
