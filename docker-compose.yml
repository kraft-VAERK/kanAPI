services:
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data:/var/lib/postgresql
    networks:
      - project_network

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - project_network

  openfga-db:
    image: postgres:17
    container_name: openfga-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openfga
    networks:
      - project_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  openfga-migrate:
    image: openfga/openfga:latest
    container_name: openfga-migrate
    depends_on:
      openfga-db:
        condition: service_healthy
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://postgres:password@openfga-db:5432/openfga?sslmode=disable"
    networks:
      - project_network

  openfga:
    image: openfga/openfga:latest
    container_name: openfga
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://postgres:password@openfga-db:5432/openfga?sslmode=disable"
      OPENFGA_AUTHN_METHOD: preshared
      OPENFGA_AUTHN_PRESHARED_KEYS: "${FGA_PRESHARED_KEY:-kanapi-fga-secret-change-me}"
    command: run
    networks:
      - project_network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minio
      - openfga
    networks:
      - project_network

volumes:
  data:
    driver: local
  minio-data:
    driver: local
networks:
  project_network:
    driver: bridge
