services:
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql
    networks:
      - project_network

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - project_network

  openfga-db:
    image: postgres:17
    container_name: openfga-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openfga
    ports:
      - "5433:5432"
    networks:
      - project_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  openfga-migrate:
    image: openfga/openfga:latest
    container_name: openfga-migrate
    depends_on:
      openfga-db:
        condition: service_healthy
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://postgres:password@openfga-db:5432/openfga?sslmode=disable"
    networks:
      - project_network

  openfga:
    image: openfga/openfga:latest
    container_name: openfga
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
      - "3000:3000"
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://postgres:password@openfga-db:5432/openfga?sslmode=disable"
    command: run
    networks:
      - project_network

  loki:
    image: grafana/loki:3.4.3
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - project_network

  promtail:
    image: grafana/promtail:3.4.3
    container_name: promtail
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/kanapi:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - project_network

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./observability/grafana-dashboard-provision.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - project_network

volumes:
  data:
    driver: local
  minio-data:
    driver: local
  grafana-data:
    driver: local
networks:
  project_network:
    driver: bridge
